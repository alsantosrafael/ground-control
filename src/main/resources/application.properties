spring.application.name=ground-control

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ground_control}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.org.springframework.modulith=DEBUG

# Virtual Threads (DP-04: non-blocking persistence via Java 21 VT)
spring.threads.virtual.enabled=true

# Graceful shutdown — Tomcat drains in-flight requests before the pod dies
# Analytics reliability across restarts is guaranteed by the Modulith outbox (EVENT_PUBLICATION)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Async executor shutdown — gives @ApplicationModuleListener tasks a chance to finish
# before the context is closed; outbox handles anything that doesn't make the window
spring.task.execution.shutdown.await-termination=true
spring.task.execution.shutdown.await-termination-period=30s

# Database connection pool — explicit sizing is required when using virtual threads
# The pool IS the concurrency ceiling for DB-bound VTs; unbounded VTs park cheaply
# but still consume resources waiting for connections. See AsyncConfig for the matching
# application-level semaphore (ASYNC_CONCURRENCY_LIMIT).
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Caching
spring.cache.type=caffeine
spring.modulith.events.jdbc-schema-initialization.enabled=false
